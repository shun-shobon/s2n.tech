name: ci
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup | Node.js
        uses: ./.github/actions/setup-node

      - name: Setup | Generate types
        run: pnpm run sync

      - name: Run | Lint
        run: pnpm run lint --max-warnings 0

  format:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup | Node.js
        uses: ./.github/actions/setup-node

      - name: Setup | Generate types
        run: pnpm run sync

      - name: Run | Format
        run: pnpm run format:check

  typecheck:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup | Node.js
        uses: ./.github/actions/setup-node

      - name: Setup | Generate types
        run: pnpm run sync

      - name: Run | Typecheck
        run: pnpm run typecheck
