name: ci
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup | Node.js
        uses: ./.github/actions/setup-node

      - name: Setup | Generate types
        run: pnpm run sync

      - name: Run | Lint
        run: pnpm run lint --max-warnings 0

  format:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup | Node.js
        uses: ./.github/actions/setup-node

      - name: Setup | Generate types
        run: pnpm run sync

      - name: Run | Format
        run: pnpm run format:check

  typecheck:
    runs-on: ubuntu-slim
    timeout-minutes: 5
    steps:
      - name: Setup | Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup | Node.js
        uses: ./.github/actions/setup-node

      - name: Setup | Generate types
        run: pnpm run sync

      - name: Run | Typecheck
        run: pnpm run typecheck
